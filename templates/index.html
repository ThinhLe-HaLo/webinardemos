<!DOCTYPE html>
<html>
<head>
    <title>AI Research Assistant (Demo)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        #chat-box { border: 1px solid #ccc; padding: 20px; height: 300px; overflow-y: scroll; background: #f9f9f9; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #0078d4; color: white; border: none; }
    </style>
</head>
<body>
    <h2>AI Research Assistant (SSRF Demo)</h2>
    <div id="chat-box"></div><br>
    <input type="text" id="user-input" placeholder="Nhập yêu cầu (ví dụ: Tóm tắt nội dung link...)">
    <button onclick="sendRequest()">Gửi</button>

    <script>
        async function sendRequest() {
            const input = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<b>Bạn:</b> ${input}<br>`;
            
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: input})
            });
            const data = await response.json();
            chatBox.innerHTML += `<b>AI:</b> ${data.answer}<hr>`;
        }
    </script>
</body>
</html>
